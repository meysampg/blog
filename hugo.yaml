baseURL: https://synpacket.io/
title: 'SYN Packet'
languageCode: fa-IR

theme: PaperMod
cleanDestinationDir: true
enableRobotsTXT: true
defaultContentLanguage: fa
defaultContentLanguageInSubdir: true
enableInlineShortcodes: true

markup:
  highlight:
    style: evergarden
    lineNos: true
    lineNumbersInTable: false
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - '\['
            - '\]'
          - - $$
            - $$
          inline:
          - - $
            - $
        enable: true

languages:
  fa:
    languagedirection: rtl
    languageName: "Farsi"
    weight: 1
    menu:
      main:
        - name: بلاگ
          url: blog/
          weight: 2
        - name: درباره
          url: about/
          weight: 5
        - name: GPG
          url: about/files/public.key
          weight: 6

pagination:
  pagerSize: 10

params:
  env: production
  keywords: [Blog, OpenSource, Coding, Golang, Programming]
  author: "میثم پورگنجی"
  defaultTheme: auto
  disableThemeToggle: false

  ShowToc: true
  TocOpen: true
  ShowBreadCrumbs: true
  ShowReadingTime: false
  ShowPostNavLinks: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true
  hideAuthor: false

  math: false

  editPost:
    URL: "https://github.com/meysampg/blog/edit/main/content"
    Text: "پیشنهاد تغییر"
    appendFilePath: true

  homeInfoParams:
    Title: "میثم پورگنجی"
    Content: "From Freedom Came Elegance"

  socialIcons:
    - name: github
      url: "https://github.com/meysampg"
    - name: RSS
      url: "index.xml"

  taxonomies:
    tag: tags
    category: categories
    series: series

taxonomies:
  tag: tags
  category: categories
  series: series

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON